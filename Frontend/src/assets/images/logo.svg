<svg width="260" height="220" viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient Background Circle -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9; stop-opacity:1" />
    </linearGradient>
  </defs>

  <circle cx="130" cy="90" r="70" fill="url(#grad1)" />

  <!-- Airplane Path -->
  <path d="M80 95 Q130 40 180 95" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Plane Icon -->
  <g transform="translate(130 70) rotate(25)">
    <polygon points="0,-8 6,8 0,4 -6,8" fill="#FFFFFF"/>
  </g>

  <!-- Brand Name -->
  <text x="130" y="175" text-anchor="middle"
        font-family="Poppins, Arial, sans-serif"
        font-size="28" font-weight="700"
        fill="#0F172A">
    Travel Story
  </text>

  <!-- Tagline -->
  <text x="130" y="198" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="12"
        fill="#64748B">
    Explore • Dream • Discover
  </text>

</svg>
